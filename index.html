<!-- Error handler: catches script/CDN failures -->
<script>
window.addEventListener("error", function(e) {
  var r = document.getElementById("root");
  if (r && r.innerHTML.indexOf("Loading") !== -1) {
    r.innerHTML = '<div style="padding:40px;max-width:600px;margin:60px auto;font-family:system-ui;color:#94a3b8;background:#0f172a;border:1px solid #1e293b;border-radius:16px"><h2 style="color:#f59e0b;margin:0 0 12px">CRM Load Error</h2><p style="margin:0 0 8px;color:#ef4444">' + (e.message || "Unknown error") + '</p><p style="margin:0;font-size:13px">Check that you have an internet connection (needed for React/Babel from CDN), then refresh.</p></div>';
  }
}, true);
</script>

function uid() { return Math.random().toString(36).slice(2, 10); }

// FIX: correct regex was /?
// which is invalid. Fixed to /\r?\n/
function parseCsv(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim().length);
  if (lines.length < 2) return [];
  const splitLine = line =>
    line.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/).map(c => c.replace(/^"|"$/g, "").trim());
  const headers = splitLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = splitLine(line);
    const row = {};
    headers.forEach((h, i) => { row[h] = vals[i] || ""; });
    return row;
  });
}

function moveToBusinessDay(date) {
  const d = new Date(date);
  const day = d.getDay();
  if (day === 6) d.setDate(d.getDate() + 2);
  if (day === 0) d.setDate(d.getDate() + 1);
  return d;
}

function addDays(dateString, days, weekendAware = true) {
  const base = dateString ? new Date(dateString) : new Date();
  const next = new Date(base);
  next.setDate(next.getDate() + days);
  const final = weekendAware ? moveToBusinessDay(next) : next;
  return final.toISOString().slice(0, 10);
}

function getStageRule(rules, kind, stage) {
  const t = kind === "individual" ? "individual" : "business";
  return (rules?.[t] || defaultStageAutomationRules[t] || {})[stage];
}

function matchServices(contact) {
  const selected = new Set(contact.goals || []);
  const industry = String(contact.industry || contact.occupation || "").toLowerCase();
  const isBusiness = contact.kind === "business";

  const ranked = services.map(service => {
    let score = service.fit.reduce((acc, tag) => acc + (selected.has(tag) ? 2 : 0), 0);
    if (service.key === "9x12" && isBusiness) score += 2;
    if (/real estate|invest/.test(industry) && ["9x12","eestate","tardus","maven"].includes(service.key)) score += 2;
    if (/home|roof|plumb|hvac|landscap|pool|paint|garage|gutter|fence|handyman|remodel|floor|deck|paving|window|solar|clean/.test(industry) && ["9x12","website","bots"].includes(service.key)) score += 2;
    if (selected.has("tax") && ["tax","pcs","maven"].includes(service.key)) score += 2;
    if (selected.has("employee_benefits") && ["perks","health"].includes(service.key)) score += 2;
    if (selected.has("automation") && service.key === "bots") score += 2;
    if (selected.has("website") && service.key === "website") score += 2;
    if (selected.has("funding") && service.key === "funding") score += 2;
    if (selected.has("wealth") && ["wealthpath","retirement","eestate"].includes(service.key)) score += 2;
    if (selected.has("health") && service.key === "health") score += 2;
    if (!isBusiness && ["wealthpath","health","retirement","funding","perks"].includes(service.key)) score += 1;
    return { ...service, score };
  }).filter(s => s.score > 0).sort((a, b) => b.score - a.score);

  return ranked.length ? ranked.slice(0, 6)
    : services.filter(s => isBusiness ? s.category !== "Individual" : s.category !== "Business").slice(0, 5);
}

function nextStepLogic(contact) {
  const selected = new Set(contact.goals || []);
  const recommendations = matchServices(contact);
  const top = recommendations[0]?.label || "strategy review";
  if (contact.kind === "business") {
    if (selected.has("direct_mail") || selected.has("local_visibility")) return `Lead with ${top}, then move toward a 10-minute postcard or visibility review.`;
    if (selected.has("website") || selected.has("conversion")) return `Lead with ${top}, then review the website, offer, and call to action before adding traffic.`;
    if (selected.has("tax") || selected.has("funding")) return `Lead with ${top}, then map the money side before piling on marketing.`;
    return `Start with ${top}, then move into the second recommendation only after the first action is live.`;
  }
  if (selected.has("health")) return `Start with ${top}, then review the simplest coverage or savings option first.`;
  if (selected.has("cash_flow") || selected.has("funding")) return `Start with ${top}, then focus on the fastest cash-flow improvement.`;
  return `Start with ${top}, then stack only one additional move after the first win is clear.`;
}

function scoreContact(contact) {
  let score = 35;
  if (contact.website) score += 10;
  if ((contact.goals || []).length >= 3) score += 10;
  if (contact.phone) score += 5;
  if (contact.email) score += 5;
  if (contact.kind === "business" && contact.employeeCount) score += 5;
  if (contact.nextFollowUp) score += 5;
  if ((contact.notes || []).length) score += 10;
  return Math.min(100, score);
}

function rankContact(contact) {
  const score = scoreContact(contact);
  let priority = score;
  const today = new Date().toISOString().slice(0, 10);
  if (contact.nextFollowUp) {
    if (contact.nextFollowUp < today) priority += 30;
    else if (contact.nextFollowUp === today) priority += 20;
  }
  if (contact.stage === "Proposal Sent") priority += 18;
  else if (contact.stage === "Meeting Booked") priority += 15;
  else if (contact.stage === "Report Sent") priority += 12;
  else if (contact.stage === "Qualified") priority += 8;
  else if (["Closed Won","Closed Lost"].includes(contact.stage)) priority -= 50;
  if ((contact.notes || []).length >= 3) priority += 5;
  if (contact.reportCount > 0) priority += 6;
  if ((contact.revenueItems || []).length > 0) priority += 10;
  return priority;
}

function graderResults(input) {
  const website = String(input.website || "").trim();
  const reviews = Number(input.reviews || 0);
  const hasOffer = Boolean(input.hasOffer), hasCTA = Boolean(input.hasCTA);
  const hasPhotos = Boolean(input.hasPhotos), hasFollowUp = Boolean(input.hasFollowUp);
  const hasDirectMailFit = Boolean(input.hasDirectMailFit), hasMultiLocation = Boolean(input.hasMultiLocation);
  const preset = getIndustryPreset(input.industry);

  const scores = {
    webPresence: website ? 18 : 6, trust: Math.min(18, (reviews >= 20 ? 12 : reviews >= 5 ? 8 : 4) + (hasPhotos ? 6 : 0)),
    offer: hasOffer ? 16 : 6, cta: hasCTA ? 16 : 6, followUp: hasFollowUp ? 14 : 5,
    localFit: hasDirectMailFit ? 10 : 4, automation: hasMultiLocation ? 8 : 4,
  };
  const maxes = { webPresence: 20, trust: 20, offer: 18, cta: 18, followUp: 16, localFit: 12, automation: 10 };
  Object.keys(scores).forEach(k => { scores[k] = Math.min(maxes[k], scores[k]); });
  const total = Math.min(100, Object.values(scores).reduce((a, b) => a + b, 0));

  const issues = [];
  if (!website) issues.push("No clear website or weak web presence.");
  if (!hasOffer) issues.push("Offer is unclear or missing.");
  if (!hasCTA) issues.push("Call to action is weak or not obvious.");
  if (!hasFollowUp) issues.push("No visible follow-up system or retention play.");
  if (reviews < 5) issues.push("Low visible review/trust signal.");

  const wins = [];
  if (hasDirectMailFit) wins.push("Strong fit for local visibility offers like 9x12.");
  if (hasMultiLocation) wins.push("Possible automation / bot opportunity.");
  if (website && hasCTA) wins.push("Has a base to improve conversion faster.");

  const inferredGoals = [...preset.emphasis];
  if (!website) inferredGoals.push("website");
  if (!hasCTA) inferredGoals.push("conversion");
  if (hasDirectMailFit) inferredGoals.push("direct_mail", "local_visibility");
  if (!hasFollowUp) inferredGoals.push("automation");
  if (/real estate|invest/i.test(input.industry || "")) inferredGoals.push("real_estate", "investor");

  const executiveSummary = `${preset.summary} Current quick-grade score: ${total}/100. The most likely early win is improving ${!hasOffer ? "offer clarity" : !hasCTA ? "call to action" : !hasFollowUp ? "follow-up discipline" : "conversion flow"} before trying to do everything at once.`;
  return { total, scores, issues, wins, inferredGoals: [...new Set(inferredGoals)], preset, executiveSummary };
}

// ─── TOAST SYSTEM ────────────────────────────────────────────────────────────
function useToast() {
  const [toasts, setToasts] = useState([]);
  const add = useCallback((message, type = "success") => {
    const id = uid();
    setToasts(prev => [...prev, { id, message, type, leaving: false }]);
    setTimeout(() => {
      setToasts(prev => prev.map(t => t.id === id ? { ...t, leaving: true } : t));
      setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 300);
    }, 3000);
  }, []);
  return { toasts, add };
}

function ToastContainer({ toasts }) {
  if (!toasts.length) return null;
  return (
    <div className="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none">

// ─── AI ANALYSIS PANEL ───────────────────────────────────────────────────────
function AIAnalysisPanel({ contact, cachedAnalysis, onSave }) {
  const [loading, setLoading] = useState(false);
  const [analysis, setAnalysis] = useState(cachedAnalysis || null);
  const [error, setError] = useState(null);

  const [apiKey, setApiKeyState] = useState(() => { try { return localStorage.getItem("ownly-api-key") || ""; } catch { return ""; } });
  const [showKeyInput, setShowKeyInput] = useState(false);

  async function run() {
    const key = (typeof localStorage !== "undefined" ? localStorage.getItem("ownly-api-key") : "") || apiKey;
    if (!key) { setShowKeyInput(true); setError("Enter your Anthropic API key to use AI analysis."); return; }
    setLoading(true); setError(null);
    try {
      const result = await analyzeContactWithAI(contact, key);
      setAnalysis(result); onSave(result);
    } catch (e) { setError("Analysis failed: " + e.message); }
    finally { setLoading(false); }
  }
  
  function saveKey() { try { localStorage.setItem("ownly-api-key", apiKey); } catch {} setShowKeyInput(false); setError(null); }

  const priorityColors = { High: "text-red-400 bg-red-500/10 border-red-500/30", Medium: "text-amber-400 bg-amber-500/10 border-amber-500/30", Low: "text-slate-400 bg-slate-800 border-slate-700" };

  return (
    <div className="rounded-2xl border border-violet-500/20 bg-violet-500/5 p-5">
      <div className="flex items-center justify-between mb-4">
        <div className="flex items-center gap-2">
          <Brain className="h-4 w-4 text-violet-400" />
          <span className="text-sm font-semibold text-violet-300">AI Lead Analysis</span>
        </div>
        <div className="flex items-center gap-1.5"><button type="button" onClick={() => setShowKeyInput(!showKeyInput)} title="Set API Key" className="text-slate-600 hover:text-violet-400 transition text-xs px-1">🔑</button>
        <Button size="sm" onClick={run} disabled={loading}
          className="rounded-xl bg-violet-600 hover:bg-violet-500 text-white text-xs h-7 px-3 gap-1.5">
          {loading ? <><RefreshCw className="h-3 w-3 ownly-spin" />Analyzing…</> : <><Zap className="h-3 w-3" />{analysis ? "Re-analyze" : "Analyze"}</>}
        </Button></div>
      </div>

      {showKeyInput && (
        <div className="mb-3 flex gap-2">
          <input value={apiKey} onChange={e => setApiKeyState(e.target.value)} placeholder="sk-ant-... (stored locally in browser only)" className="flex-1 rounded-xl border border-violet-500/30 bg-slate-950 text-slate-200 placeholder:text-slate-600 px-3 h-8 text-xs focus:outline-none" />
          <button type="button" onClick={saveKey} className="rounded-xl bg-violet-600 hover:bg-violet-500 text-white text-xs px-3 h-8 shrink-0">Save Key</button>
        </div>
      )}
      {error && <p className="text-xs text-red-400 mb-3">{error}</p>}

      {loading && (
        <div className="space-y-3">
          {[80, 60, 90, 70].map((w, i) => (
            <div key={i} className="h-4 rounded-lg bg-slate-800 ownly-shimmer" style={{ width: `${w}%` }} />
          ))}
        </div>
      )}

      {!loading && analysis && (
        <div className="space-y-3 ownly-fade-up">
          <div className="flex items-center gap-2">
            <span className={`rounded-lg border px-2 py-1 text-xs font-semibold ${priorityColors[analysis.priorityRating] || priorityColors.Low}`}>{analysis.priorityRating} Priority</span>
            <span className="text-xs text-slate-500">{analysis.priorityReason}</span>
          </div>
          <AIBlock icon={Zap} label="Best opening line" text={analysis.bestOpeningLine} copyable />
          <AIBlock icon={Award} label="Top offer" text={analysis.topOffer} />
          <AIBlock icon={AlertCircle} label={`Objection: "${analysis.keyObjection}"`} text={`Response: ${analysis.objectionResponse}`} />
          <AIBlock icon={ChevronRight} label="Next action today" text={analysis.nextAction} highlight />
          <AIBlock icon={Sparkles} label="Insight" text={analysis.insightSummary} />
        </div>
      )}

      {!loading && !analysis && !error && (
        <p className="text-xs text-slate-600">Click Analyze to get AI-powered insights tailored to this specific lead.</p>
      )}
    </div>
  );
}

// ─── REVENUE TRACKER ─────────────────────────────────────────────────────────
function RevenueTracker({ contacts, onUpdate }) {
  const [amount, setAmount] = useState("");
  const [type, setType] = useState("Recurring");
  const [contactId, setContactId] = useState(contacts[0]?.id || "");

  const totals = useMemo(() => {
    let recurring = 0, oneTime = 0;
    contacts.forEach(c => (c.revenueItems || []).forEach(r => {
      const val = Number(r.amount || 0);
      r.type === "Recurring" ? recurring += val : oneTime += val;
    }));
    return { recurring, oneTime, pipeline: recurring + oneTime };
  }, [contacts]);

  function addRevenue() {
    if (!contactId || !amount) return;
    const target = contacts.find(c => c.id === contactId);
    if (!target) return;
    const items = [...(target.revenueItems || []), { id: uid(), amount, type, at: new Date().toISOString() }];
    onUpdate(contactId, { revenueItems: items });
    setAmount("");
  }

  return (
    <Card className="rounded-2xl border-slate-800 bg-slate-900/50">
      <CardHeader className="pb-3">
        <CardTitle className="text-sm flex items-center gap-2 text-slate-200"><DollarSign className="h-4 w-4 text-amber-400" />Revenue Tracker</CardTitle>
      </CardHeader>
      <CardContent className="space-y-3">
        <div className="grid gap-2 md:grid-cols-3">
          <Stat label="MRR" value={`$${totals.recurring.toLocaleString()}`} icon={DollarSign} />
          <Stat label="One-Time" value={`$${totals.oneTime.toLocaleString()}`} icon={DollarSign} />
          <Stat label="Total Tracked" value={`$${totals.pipeline.toLocaleString()}`} icon={TrendingUp} />
        </div>
        <div className="grid gap-2 md:grid-cols-[1fr_.8fr_.9fr_auto]">
          <Select value={contactId} onValueChange={setContactId}>
            <SelectTrigger className="border-slate-700 bg-slate-950 text-slate-200 h-9"><SelectValue placeholder="Choose contact" /></SelectTrigger>
            <SelectContent>{contacts.map(c => <SelectItem key={c.id} value={c.id}>{c.businessName || c.name}</SelectItem>)}</SelectContent>
          </Select>

function LeadFinderGrader({ onCreateLead, savedQueue = [], onSaveQueue, existingContacts = [], onMergeIntoCrm, onToast }) {
  const [form, setForm] = useState({ businessName: "", name: "", email: "", phone: "", website: "", city: "", state: "", industry: "", employeeCount: "", source: "Lead Finder", reviews: "", hasOffer: false, hasCTA: false, hasPhotos: false, hasFollowUp: false, hasDirectMailFit: true, hasMultiLocation: false });
  const [queue, setQueue] = useState(savedQueue);
  const [selectedIds, setSelectedIds] = useState([]);

  useEffect(() => { setQueue(savedQueue || []); }, [savedQueue]);
  useEffect(() => { onSaveQueue?.(queue); }, [queue]);

  const result = useMemo(() => graderResults(form), [form]);
  const preset = result.preset;

  const draftContact = { kind: "business", businessName: form.businessName, name: form.name, email: form.email, phone: form.phone, website: form.website, city: form.city, state: form.state, industry: form.industry, employeeCount: form.employeeCount, source: form.source, goals: result.inferredGoals, graderSummary: result.executiveSummary };
  const recommendations = matchServices(draftContact);

  const snapshot = useMemo(() => {
    const firstOffer = recommendations[0]?.label || "Strategy review";
    const secondOffer = recommendations[1]?.label || "Follow-up improvement";
    const approaches = {
      "Real Estate / Investor": { bestApproach: "Lead with visibility, speed-to-lead, and category differentiation.", likelyObjection: "I already have Zillow, referrals, and social media." },
      "Home Services": { bestApproach: "Lead with one-job ROI logic. Show how one decent local job can justify the offer fast.", likelyObjection: "We already get business from word of mouth." },
      "Restaurant / Local Lifestyle": { bestApproach: "Lead with traffic-driving offers and local repeat visibility.", likelyObjection: "Margins are tight right now." },
      "Health / Beauty / Wellness": { bestApproach: "Lead with trust, premium positioning, and a clear first-offer funnel.", likelyObjection: "We already post on social media." },
      "Professional Services": { bestApproach: "Lead with credibility, clear calls to action, and a cleaner follow-up path.", likelyObjection: "Most of our business comes from referrals." },
    };
    const { bestApproach, likelyObjection } = approaches[preset.label] || { bestApproach: "Lead with the top opportunity, keep the pitch simple, and move to a short review call.", likelyObjection: "We already have something in place." };
    return { firstOffer, secondOffer, bestApproach, likelyObjection };
  }, [preset.label, recommendations]);

  function normalizeText(v) { return String(v || "").trim().toLowerCase(); }

  function isLikelyDuplicate(a, b) {
    const aWeb = normalizeText(a.website), bWeb = normalizeText(b.website);
    const aPhone = normalizeText(a.phone), bPhone = normalizeText(b.phone);
    const aEmail = normalizeText(a.email), bEmail = normalizeText(b.email);
    if (aWeb && bWeb && aWeb === bWeb) return true;
    if (aPhone && bPhone && aPhone === bPhone) return true;
    if (aEmail && bEmail && aEmail === bEmail) return true;
    const aBiz = normalizeText(a.businessName), bBiz = normalizeText(b.businessName);
    if (aBiz && bBiz && aBiz === bBiz && normalizeText(a.city) === normalizeText(b.city) && normalizeText(a.state) === normalizeText(b.state)) return true;
    return false;
  }

  function findCrmDuplicate(row) { return existingContacts.find(c => isLikelyDuplicate(c, row)) || null; }

  function mergeLeadIntoContact(existing, incoming) {
    const mergedGoals = [...new Set([...(existing.goals || []), ...(incoming.goals || [])])];
    const mergeAt = new Date().toISOString();
    return {
      ...existing, name: existing.name || incoming.name, businessName: existing.businessName || incoming.businessName,
      email: existing.email || incoming.email, phone: existing.phone || incoming.phone, website: existing.website || incoming.website,
      city: existing.city || incoming.city, state: existing.state || incoming.state, industry: existing.industry || incoming.industry,
      graderSummary: incoming.graderSummary || existing.graderSummary, bestApproach: incoming.bestApproach || existing.bestApproach,
      likelyObjection: incoming.likelyObjection || existing.likelyObjection, firstOffer: incoming.firstOffer || existing.firstOffer,
      goals: mergedGoals, recommendations: matchServices({ ...existing, ...incoming, goals: mergedGoals }),
      notes: [...(existing.notes || []), { id: uid(), text: `Updated from Lead Finder on ${new Date(mergeAt).toLocaleString()}.`, at: mergeAt }],
      mergeHistory: [{ id: uid(), at: mergeAt, source: incoming.source || "Lead Finder", summary: "Merged duplicate lead.", incomingBusinessName: incoming.businessName || "", incomingEmail: incoming.email || "", incomingPhone: incoming.phone || "" }, ...(existing.mergeHistory || [])],
    };
  }

  function buildQueuedLead() {
    return { id: uid(), ...draftContact, score: result.total, presetLabel: preset.label, issues: result.issues, wins: result.wins, bestApproach: snapshot.bestApproach, likelyObjection: snapshot.likelyObjection, firstOffer: snapshot.firstOffer };
  }

  function queueLead() {
    if (!form.businessName && !form.name) { onToast("Enter a business or contact name first", "warning"); return; }
    const item = buildQueuedLead();
    const dupInCrm = findCrmDuplicate(item);
    if (dupInCrm) { onMergeIntoCrm?.(dupInCrm.id, mergeLeadIntoContact(dupInCrm, item)); onToast("Merged into existing CRM record"); return; }
    setQueue(prev => {
      if (prev.some(e => isLikelyDuplicate(e, item))) { onToast("Duplicate already in queue", "warning"); return prev; }
      return [item, ...prev];
    });
    onToast("Lead saved to queue");
  }

  function pushQueuedLead(item) {
    const dup = findCrmDuplicate(item);
    if (dup) { onMergeIntoCrm?.(dup.id, mergeLeadIntoContact(dup, item)); setQueue(prev => prev.filter(q => q.id !== item.id)); onToast("Merged into CRM"); return; }
    onCreateLead(item); setQueue(prev => prev.filter(q => q.id !== item.id)); onToast("Lead added to CRM");
  }

  function pushAll() {
    queue.forEach(item => {
      const dup = findCrmDuplicate(item);
      if (dup) { onMergeIntoCrm?.(dup.id, mergeLeadIntoContact(dup, item)); }
      else onCreateLead(item);
    });
    setQueue([]); setSelectedIds([]); onToast(`Pushed ${queue.length} leads to CRM`);
  }

  function normalizeCsvRow(row) {
    const businessName = row.businessName || row.business_name || row.company || row.name || row.business || "";
    const contactName = row.contactName || row.contact_name || row.owner_name || row.owner || row.contact || "";
    const email = row.email || row.owner_email || row.emails_all || "";
    const phone = row.phone || row.owner_phone || row.mobile || "";
    const website = row.website || row.url || "";
    const city = row.city || ""; const state = row.state || "";
    const industry = row.industry || row.category || "";
    const source = row.source || row.source_name || "CSV Import";
    const reviews = row.review_count || row.reviews || "";
    const quick = graderResults({ website, industry, reviews, hasOffer: false, hasCTA: false, hasPhotos: false, hasFollowUp: false, hasDirectMailFit: true, hasMultiLocation: false });
    const base = { kind: "business", businessName, name: contactName, email, phone, website, city, state, industry, employeeCount: row.employeeCount || "", source, goals: quick.inferredGoals, graderSummary: quick.executiveSummary, score: quick.total, presetLabel: quick.preset.label, issues: quick.issues, wins: quick.wins };
    const matched = matchServices(base);
    return { id: uid(), ...base, firstOffer: matched[0]?.label || "Strategy review", bestApproach: `Lead with ${matched[0]?.label || "the top opportunity"}, then move to a short review.`, likelyObjection: "We already have something in place." };
  }

  function handleCsvImport(event) {
    const file = event.target.files?.[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const rows = parseCsv(String(reader.result || ""));
        const imported = rows.map(normalizeCsvRow).filter(r => r.businessName || r.name);
        let added = 0, merged = 0;
        setQueue(prev => {
          const kept = [];
          imported.forEach(item => {
            const dup = findCrmDuplicate(item);
            if (dup) { onMergeIntoCrm?.(dup.id, mergeLeadIntoContact(dup, item)); merged++; return; }
            if (prev.some(e => isLikelyDuplicate(e, item)) || kept.some(e => isLikelyDuplicate(e, item))) return;
            kept.push(item); added++;
          });
          onToast(`Imported ${added} leads${merged ? `, merged ${merged}` : ""}`);
          return [...kept, ...prev];
        });
      } catch { onToast("CSV import failed. Check the file format.", "error"); }
    };
    reader.readAsText(file);
    event.target.value = "";
  }

  const presets = [
    { label: "Real Estate", patch: { industry: "Real Estate", hasCTA: true, hasPhotos: true, hasDirectMailFit: true } },
    { label: "Home Services", patch: { industry: "Home Services", hasCTA: true, hasPhotos: true, hasDirectMailFit: true } },
    { label: "Restaurant", patch: { industry: "Restaurant", hasCTA: true, hasPhotos: true, hasDirectMailFit: true } },
    { label: "Med Spa", patch: { industry: "Med Spa", hasCTA: true, hasPhotos: true, hasFollowUp: true, hasDirectMailFit: true } },
    { label: "Professional", patch: { industry: "Financial / Legal", hasCTA: true, hasFollowUp: true, hasDirectMailFit: true } },
  ];

  return (
    <div className="space-y-6">
      <div className="grid gap-6 lg:grid-cols-2">
        <Card className="rounded-2xl border-slate-800 bg-slate-900/50">
          <CardHeader className="pb-3">
            <CardTitle className="text-sm flex items-center gap-2 text-slate-200"><Search className="h-4 w-4 text-amber-400" />Lead Grader</CardTitle>
            <CardDescription className="text-slate-600 text-xs">Grade the opportunity before pushing to CRM.</CardDescription>
          </CardHeader>
          <CardContent className="space-y-4">
            <div className="flex flex-wrap gap-1.5">
              {presets.map(p => (
                <Button key={p.label} type="button" size="sm" variant="outline" className="rounded-lg border-slate-700 bg-slate-900 text-slate-400 hover:bg-slate-800 h-7 text-xs" onClick={() => setForm(prev => ({ ...prev, ...p.patch }))}>{p.label}</Button>
              ))}
            </div>
            <div className="grid gap-2 md:grid-cols-2">
              {[["businessName","Business name"],["name","Contact name"],["email","Email"],["phone","Phone"],["website","Website"],["industry","Industry"],["city","City"],["state","State"],["employeeCount","Employees"],["reviews","Review count"]].map(([key, ph]) => (
                <Input key={key} placeholder={ph} value={form[key]} onChange={e => setForm({ ...form, [key]: e.target.value })} className="border-slate-700 bg-slate-950 text-slate-200 placeholder:text-slate-600 h-9" />
              ))}
            </div>
            <div className="grid gap-2 md:grid-cols-2">
              <ToggleCard label="Has clear offer" checked={form.hasOffer} onToggle={() => setForm({ ...form, hasOffer: !form.hasOffer })} />
              <ToggleCard label="Has clear CTA" checked={form.hasCTA} onToggle={() => setForm({ ...form, hasCTA: !form.hasCTA })} />
              <ToggleCard label="Has quality photos / trust" checked={form.hasPhotos} onToggle={() => setForm({ ...form, hasPhotos: !form.hasPhotos })} />
              <ToggleCard label="Has follow-up system" checked={form.hasFollowUp} onToggle={() => setForm({ ...form, hasFollowUp: !form.hasFollowUp })} />
              <ToggleCard label="Strong 9x12 / local fit" checked={form.hasDirectMailFit} onToggle={() => setForm({ ...form, hasDirectMailFit: !form.hasDirectMailFit })} />
              <ToggleCard label="Multi-location / automation" checked={form.hasMultiLocation} onToggle={() => setForm({ ...form, hasMultiLocation: !form.hasMultiLocation })} />
            </div>
            <div className="grid gap-2 md:grid-cols-2">
              <Button className="w-full rounded-xl bg-amber-500 text-slate-950 hover:bg-amber-400 h-9 text-sm" onClick={() => { onCreateLead({ ...draftContact, bestApproach: snapshot.bestApproach, likelyObjection: snapshot.likelyObjection, firstOffer: snapshot.firstOffer }); onToast("Lead added to CRM"); }}>Add to CRM Now</Button>
              <Button variant="outline" className="w-full rounded-xl border-slate-700 bg-slate-900 hover:bg-slate-800 text-slate-300 h-9 text-sm" onClick={queueLead}>Save to Queue</Button>
            </div>
          </CardContent>
        </Card>

        <Card className="rounded-2xl border-slate-800 bg-slate-900/50">
          <CardHeader className="pb-3">
            <CardTitle className="text-sm flex items-center gap-2 text-slate-200"><Sparkles className="h-4 w-4 text-amber-400" />Opportunity Score</CardTitle>
          </CardHeader>
          <CardContent className="space-y-4">
            <div className="rounded-xl border border-amber-500/20 bg-amber-500/5 p-4">
              <div className="text-xs font-semibold uppercase tracking-wider text-amber-400 mb-1">{preset.label}</div>
              <p className="text-xs text-slate-400 leading-relaxed">{result.executiveSummary}</p>

            <div className="grid gap-2 md:grid-cols-2">
              <Stat label="Score" value={`${result.total}/100`} icon={AlertCircle} />
              <Stat label="Services" value={recommendations.length} icon={Sparkles} />
            </div>

              <ScoreLine label="Web Presence" value={result.scores.webPresence} max={20} />

            </div>
            {result.issues.length > 0 && (

                <div className="text-xs uppercase tracking-wider text-slate-500 mb-2">Gaps</div>
                <div className="space-y-1">{result.issues.map((issue, i) => <div key={i} className="rounded-lg border border-slate-800 bg-slate-950/60 p-2.5 text-xs text-slate-400">{issue}</div>)}</div>
              </div>

            {result.wins.length > 0 && (
              <div>

            <div className="rounded-xl border border-slate-800 bg-slate-950/60 p-4 space-y-2">
              {[["Best first offer", snapshot.firstOffer], ["Best approach", snapshot.bestApproach], ["Likely objection", snapshot.likelyObjection]].map(([label, val]) => (
                <div key={label}><span className="text-xs text-slate-500">{label}: </span><span className="text-xs text-slate-300">{val}</span></div>

          </CardContent>
        </Card>
      </div>

      <Card className="rounded-2xl border-slate-800 bg-slate-900/50">
        <CardHeader className="pb-3">
          <div className="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
            <div>

            <div className="flex flex-wrap gap-2">
              <label className="cursor-pointer inline-flex items-center rounded-xl border border-slate-700 bg-slate-900 px-3 py-1.5 text-xs text-slate-300 hover:bg-slate-800 transition gap-1.5">

        <CardContent className="space-y-2">
          {queue.map(item => (
            <div key={item.id} className={`rounded-xl border p-4 transition-all ${selectedIds.includes(item.id) ? "border-amber-500/30 bg-amber-500/5" : "border-slate-800 bg-slate-950/60"}`}>

                    <div className="text-xs text-slate-500 mt-1">{item.industry || "Business"} • {[item.city, item.state].filter(Boolean).join(", ")} • Source: {item.source || "Lead Finder"}</div>

// ─── ANALYTICS PANEL ─────────────────────────────────────────────────────────
function AnalyticsPanel({ contacts }) {
  const stageCounts = useMemo(() => {
    const map = new Map();
    stages.forEach(s => map.set(s, 0));
    contacts.forEach(c => map.set(c.stage, (map.get(c.stage) || 0) + 1));
    return Array.from(map.entries()).map(([stage, count]) => ({ stage, count }));
  }, [contacts]);

  const sourceStats = useMemo(() => {
    const map = new Map();
    contacts.forEach(c => {
      const source = (c.source || "Unknown").trim() || "Unknown";
      const ex = map.get(source) || { source, leads: 0, won: 0, reports: 0 };
      ex.leads++; if (c.stage === "Closed Won") ex.won++; if (c.reportCount > 0) ex.reports++;
      map.set(source, ex);
    });
    return Array.from(map.values()).map(r => ({ ...r, closeRate: r.leads ? Math.round((r.won / r.leads) * 100) : 0 })).sort((a, b) => b.leads - a.leads).slice(0, 8);
  }, [contacts]);

  const conversion = useMemo(() => {
    const total = contacts.length || 1;
    return {
      qualified: Math.round(contacts.filter(c => ["Qualified","Report Sent","Meeting Booked","Proposal Sent","Closed Won"].includes(c.stage)).length / total * 100),
      meetings: Math.round(contacts.filter(c => ["Meeting Booked","Proposal Sent","Closed Won"].includes(c.stage)).length / total * 100),
      proposals: Math.round(contacts.filter(c => ["Proposal Sent","Closed Won"].includes(c.stage)).length / total * 100),
      won: Math.round(contacts.filter(c => c.stage === "Closed Won").length / total * 100),
    };
  }, [contacts]);

  return (
    <div className="space-y-6">
      <div className="grid gap-6 lg:grid-cols-2">
        <Card className="rounded-2xl border-slate-800 bg-slate-900/50">
          <CardHeader className="pb-3">
            <CardTitle className="text-sm flex items-center gap-2 text-slate-200"><TrendingUp className="h-4 w-4 text-amber-400" />Pipeline Conversion</CardTitle>
          </CardHeader>
          <CardContent className="space-y-4">
            <ConversionRow label="Qualified" value={conversion.qualified} />
            <ConversionRow label="Meeting Stage" value={conversion.meetings} />
            <ConversionRow label="Proposal Stage" value={conversion.proposals} />
            <ConversionRow label="Closed Won" value={conversion.won} />
            <Separator className="bg-slate-800" />
            <div className="space-y-1.5">
              {stageCounts.map(row => (
                <div key={row.stage} className="flex items-center justify-between rounded-lg border border-slate-800 bg-slate-950/60 px-3 py-2 text-xs">
                  <span className="text-slate-400">{row.stage}</span>
                  <span className="ownly-mono text-slate-200 font-medium">{row.count}</span>
                </div>
              ))}
            </div>
          </CardContent>
        </Card>

        <Card className="rounded-2xl border-slate-800 bg-slate-900/50">
          <CardHeader className="pb-3">
            <CardTitle className="text-sm flex items-center gap-2 text-slate-200"><Search className="h-4 w-4 text-amber-400" />Lead Source Performance</CardTitle>
          </CardHeader>
          <CardContent className="space-y-2">
            {sourceStats.map(row => (
              <div key={row.source} className="grid grid-cols-[1fr_auto_auto_auto] items-center gap-2 rounded-lg border border-slate-800 bg-slate-950/60 px-3 py-2 text-xs">
                <span className="text-slate-300 truncate font-medium">{row.source}</span>
                <span className="rounded-md bg-slate-800 px-1.5 py-0.5 text-slate-400">Leads {row.leads}</span>
                <span className="rounded-md bg-slate-800 px-1.5 py-0.5 text-slate-400">Reports {row.reports}</span>
                <span className="rounded-md bg-amber-500/10 border border-amber-500/20 px-1.5 py-0.5 text-amber-400">{row.closeRate}% close</span>
              </div>
            ))}
            {!sourceStats.length && <p className="text-xs text-slate-600">No source data yet. Start tagging lead sources.</p>}
          </CardContent>
        </Card>
      </div>
    </div>
  );
}

// ─── CAMPAIGN TRACKER ────────────────────────────────────────────────────────
function CampaignTracker({ contacts }) {
  const rows = useMemo(() => {
    const map = new Map();
    contacts.forEach(c => {
      const city = c.city || "Unknown", industry = c.industry || c.occupation || "General";
      const key = `${city}__${industry}`;
      const ex = map.get(key) || { city, industry, total: 0, won: 0, reports: 0 };
      ex.total++; if (c.stage === "Closed Won") ex.won++; if (c.reportCount) ex.reports += c.reportCount;
      map.set(key, ex);
    });
    return Array.from(map.values()).sort((a, b) => b.total - a.total).slice(0, 10);
  }, [contacts]);

  return (
    <Card className="rounded-2xl border-slate-800 bg-slate-900/50">

        {rows.map((row, idx) => (
          <div key={idx} className="grid grid-cols-[1fr_1fr_auto_auto_auto] items-center gap-2 rounded-lg border border-slate-800 bg-slate-950/60 px-3 py-2 text-xs">
            <span className="text-slate-200 font-medium truncate">{row.city}</span>
            <span className="text-slate-400 truncate">{row.industry}</span>
            <span className="rounded-md bg-slate-800 px-1.5 py-0.5 text-slate-400">{row.total}</span>
            <span className="rounded-md bg-slate-800 px-1.5 py-0.5 text-slate-400">{row.reports} rpt</span>
            <span className="rounded-md bg-amber-500/10 border border-amber-500/20 px-1.5 py-0.5 text-amber-400">{row.won} won</span>

  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [db, setDb] = useState(defaultData);
  const [dbLoaded, setDbLoaded] = useState(false);
  const [tab, setTab] = useState("dashboard");
  const [selectedId, setSelectedId] = useState(null);
  const [reportOpen, setReportOpen] = useState(false);
  const [newTask, setNewTask] = useState("");
  const [crmSearch, setCrmSearch] = useState("");
  const [crmFilter, setCrmFilter] = useState("all");
  const [automationTarget, setAutomationTarget] = useState("business");
  const { toasts, add: toast } = useToast();
  const weekendAware = db.weekendAwareFollowUps !== false;
  const saveTimer = useRef(null);

  const emptyBusiness = { kind: "business", businessName: "", name: "", title: "", email: "", phone: "", website: "", city: "", state: "", industry: "", employeeCount: "", revenue: "", goals: [], source: "", nextFollowUp: "" };
  const emptyIndividual = { kind: "individual", name: "", title: "", email: "", phone: "", city: "", state: "", occupation: "", income: "", goals: [], source: "", nextFollowUp: "" };
  const [businessForm, setBusinessForm] = useState(emptyBusiness);
  const [individualForm, setIndividualForm] = useState(emptyIndividual);

  // Load from localStorage on mount
  useEffect(() => {
    loadDataAsync().then(data => { setDb(data); setDbLoaded(true); });
  }, []);

  // Debounced save
  useEffect(() => {
    if (!dbLoaded) return;
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      const saved = await saveDataAsync(db);
      setDb(prev => ({ ...prev, lastSavedAt: saved.lastSavedAt }));
    }, 800);
    return () => clearTimeout(saveTimer.current);
  }, [db.contacts, db.tasks, db.paymentLabels, db.stageAutomationRules, db.weekendAwareFollowUps, db.leadFinderDrafts, dbLoaded]);

  const contacts = db.contacts || [];
  const stageRules = db.stageAutomationRules || defaultStageAutomationRules;

  const filteredContacts = useMemo(() => contacts.filter(c => {
    const hay = [c.businessName, c.name, c.email, c.phone, c.industry, c.occupation, c.city, c.state, c.source].filter(Boolean).join(" ").toLowerCase();
    const searchOk = !crmSearch.trim() || hay.includes(crmSearch.trim().toLowerCase());
    const filterOk = crmFilter === "all" || c.stage === crmFilter;
    return searchOk && filterOk;
  }), [contacts, crmSearch, crmFilter]);

  const selected = contacts.find(c => c.id === selectedId) || null;

  useEffect(() => {
    if (!selectedId && contacts[0]) setSelectedId(contacts[0].id);
  }, [contacts, selectedId]);

  const metrics = useMemo(() => {
    const today = new Date().toISOString().slice(0, 10);
    return {
      total: contacts.length,
      followUps: contacts.filter(c => c.nextFollowUp && c.nextFollowUp <= today && c.stage !== "Closed Won").length,
      reports: contacts.filter(c => c.reportCount > 0).length,
      won: contacts.filter(c => c.stage === "Closed Won").length,
    };
  }, [contacts]);

  const todayQueue = useMemo(() => {
    const today = new Date().toISOString().slice(0, 10);
    return [...contacts].sort((a, b) => rankContact(b) - rankContact(a))
      .filter(c => !["Closed Won","Closed Lost"].includes(c.stage))
      .map(c => {
        let reason = "General follow-up";
        if (c.nextFollowUp && c.nextFollowUp < today) reason = "⚠ Overdue";
        else if (c.nextFollowUp === today) reason = "Due today";
        else if (c.stage === "Proposal Sent") reason = "Proposal push needed";
        else if (c.stage === "Meeting Booked") reason = "Prep meeting";
        else if (c.stage === "Report Sent") reason = "Report follow-up";
        return { ...c, queueReason: reason, queueScore: rankContact(c) };
      }).slice(0, 8);
  }, [contacts]);

  function updateStageRule(target, stage, patch) {
    setDb(prev => ({ ...prev, stageAutomationRules: { ...(prev.stageAutomationRules || defaultStageAutomationRules), [target]: { ...((prev.stageAutomationRules || defaultStageAutomationRules)[target] || {}), [stage]: { ...(((prev.stageAutomationRules || defaultStageAutomationRules)[target] || {})[stage] || {}), ...patch } } } }));
  }

  function addContact(form) {
    const contact = { ...form, id: uid(), stage: "New Lead", createdAt: new Date().toISOString(), notes: [{ id: uid(), text: `Lead created via ${form.kind} intake form.`, at: new Date().toISOString() }], reportCount: 0, recommendations: matchServices(form) };
    setDb(prev => ({ ...prev, contacts: [contact, ...prev.contacts] }));
    setSelectedId(contact.id); setTab("crm");
    toast(`${contact.businessName || contact.name} added to CRM`);
  }

  function updateContact(id, patch) {
    setDb(prev => ({ ...prev, contacts: prev.contacts.map(c => c.id === id ? { ...c, ...patch, recommendations: matchServices({ ...c, ...patch }) } : c) }));
  }

  function changeStage(id, nextStage) {
    const contact = contacts.find(c => c.id === id); if (!contact) return;
    const rule = getStageRule(stageRules, contact.kind, nextStage);
    const nextFollowUp = rule ? addDays(new Date().toISOString().slice(0, 10), rule.followUpDays, weekendAware) : contact.nextFollowUp;
    const automationNote = rule ? { id: uid(), text: `[Auto] ${rule.notePrompt}${rule.cadenceHint ? ` | Hint: ${rule.cadenceHint}` : ""}`, at: new Date().toISOString() } : null;
    updateContact(id, { stage: nextStage, nextFollowUp, lastStageChangeAt: new Date().toISOString(), notes: automationNote ? [automationNote, ...(contact.notes || [])] : (contact.notes || []) });
    if (rule?.taskTemplate) {
      const taskText = renderTaskTemplate(rule.taskTemplate, contact);
      setDb(prev => {
        if ((prev.tasks || []).some(t => !t.done && t.text === taskText)) return prev;
        return { ...prev, tasks: [{ id: uid(), text: taskText, done: false, createdAt: new Date().toISOString(), source: "stage_automation", linkedContactId: id, linkedStage: nextStage, dueDate: nextFollowUp }, ...(prev.tasks || [])] };
      });
    }
    toast(`Stage → ${nextStage}`);
  }

  function addNote(id, text) {
    if (!text.trim()) return;
    const target = contacts.find(c => c.id === id);
    updateContact(id, { notes: [{ id: uid(), text, at: new Date().toISOString() }, ...(target.notes || [])] });
  }

  function deleteContact(id) {
    setDb(prev => ({ ...prev, contacts: prev.contacts.filter(c => c.id !== id) }));
    if (selectedId === id) setSelectedId(null);
  }

  function printReport(contact) {
    updateContact(contact.id, { reportCount: (contact.reportCount || 0) + 1, stage: contact.stage === "New Lead" ? "Report Sent" : contact.stage });
    setReportOpen(true);
  }

  function addTask() {
    if (!newTask.trim()) return;
    setDb(prev => ({ ...prev, tasks: [{ id: uid(), text: newTask, done: false, createdAt: new Date().toISOString() }, ...prev.tasks] }));
    setNewTask(""); toast("Task added");
  }

  function exportData() {
    const blob = new Blob([JSON.stringify(db, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "ownly-once-backup.json"; a.click();
    URL.revokeObjectURL(url); toast("Backup downloaded");
  }

  function importData(event) {
    const file = event.target.files?.[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try { const parsed = JSON.parse(String(reader.result)); setDb(parsed); saveDataAsync(parsed); toast("Data restored successfully"); }
      catch { toast("Import failed — invalid file", "error"); }
    };
    reader.readAsText(file);
  }

  function gmailLink(contact, template) {
    const email = buildEmail(contact, template);
    return `https://mail.google.com/mail/?view=cm&fs=1&to=${encodeURIComponent(contact.email || "")}&su=${encodeURIComponent(email.subject)}&body=${encodeURIComponent(email.body)}`;
  }

  const tabCounts = { crm: contacts.length, finder: (db.leadFinderDrafts || []).length };

  if (!dbLoaded) {
    return (
      <div className="ownly-root min-h-screen bg-slate-950 flex items-center justify-center">
        <div className="text-center">
          <div className="h-8 w-8 border-2 border-amber-500 border-t-transparent rounded-full ownly-spin mx-auto mb-3" />
          <p className="text-slate-500 text-sm">Loading your data…</p>
        </div>
      </div>
    );
  }

  return (
    <div className="ownly-root min-h-screen bg-slate-950 text-slate-100">
      <div className="mx-auto max-w-7xl p-4 md:p-6">

        {/* HEADER */}
        <div className="mb-6 rounded-2xl border border-slate-800 bg-slate-900/60 p-5 backdrop-blur">
          <div className="flex flex-col gap-5 md:flex-row md:items-start md:justify-between">
            <div>
              <div className="flex items-center gap-2 mb-2">
                <span className="rounded-lg border border-amber-500/30 bg-amber-500/10 px-2.5 py-1 text-xs font-semibold tracking-wider text-amber-400 uppercase">Ownly ONCE</span>
                <span className="rounded-lg border border-slate-700 bg-slate-800 px-2.5 py-1 text-xs text-slate-400">Command Center</span>
              </div>
              <h1 className="text-2xl font-semibold tracking-tight text-slate-100">Dave Ivery Operator CRM</h1>
              <p className="mt-1 text-sm text-slate-500">Own nothing. Control everything. No fluff, just pipeline.</p>
            </div>
            <div className="grid grid-cols-2 gap-2 md:grid-cols-4">
              <MetricCard icon={UserRound} label="Contacts" value={metrics.total} />
              <MetricCard icon={Clock3} label="Follow-Ups Due" value={metrics.followUps} accent={metrics.followUps > 0} />
              <MetricCard icon={FileText} label="Reports Sent" value={metrics.reports} />
              <MetricCard icon={CheckCircle2} label="Closed Won" value={metrics.won} />
            </div>
          </div>
          <div className="mt-4 flex flex-wrap items-center gap-2 text-xs">
            <span className="text-slate-600">Last saved:</span>
            <span className="ownly-mono rounded-lg bg-slate-800 border border-slate-700 px-2.5 py-1 text-slate-400">{db.lastSavedAt ? new Date(db.lastSavedAt).toLocaleString() : "Not yet"}</span>
            <Button size="sm" variant="outline" className="rounded-xl border-slate-700 bg-slate-900 text-slate-400 hover:bg-slate-800 h-8 text-xs gap-1.5" onClick={exportData}>
              <Download className="h-3.5 w-3.5" />Export
            </Button>
            <label className="cursor-pointer inline-flex h-8 items-center gap-1.5 rounded-xl border border-slate-700 bg-slate-900 px-3 text-xs text-slate-400 hover:bg-slate-800 transition">
              <Download className="h-3.5 w-3.5 rotate-180" />Import
              <input type="file" accept="application/json" className="hidden" onChange={importData} />
            </label>
            <a href="https://DaveIvery.com" target="_blank" className="inline-flex h-8 items-center rounded-xl border border-amber-500/30 bg-amber-500/10 px-3 text-xs text-amber-400 hover:bg-amber-500/20 transition">
              <ExternalLink className="h-3.5 w-3.5 mr-1.5" />DaveIvery.com
            </a>
          </div>
        </div>

        {/* QUICK ACTIONS */}
        <div className="mb-6 grid gap-3 md:grid-cols-5">
          {[
            { label: "Lead Hunt", sublabel: "Grade new leads", tab: "finder", accent: "amber" },
            { label: "Pipeline", sublabel: "Open CRM", tab: "crm", accent: null },
            { label: "Intake", sublabel: "Capture a contact", tab: "intake", accent: null },
            { label: "Reports", sublabel: "Build & send", tab: "reports", accent: null },
            { label: "9x12 Links", sublabel: `${metrics.followUps} follow-ups due`, tab: "payments", accent: metrics.followUps > 0 ? "red" : null },
          ].map(item => (
            <button key={item.tab} onClick={() => setTab(item.tab)}
              className={`rounded-2xl border p-4 text-left transition-all hover:scale-[1.01] active:scale-[0.99] ${item.accent === "amber" ? "border-amber-500/25 bg-amber-500/8 hover:bg-amber-500/15" : item.accent === "red" ? "border-red-500/25 bg-red-500/8 hover:bg-red-500/15" : "border-slate-800 bg-slate-900/60 hover:bg-slate-900"}`}>
              <div className={`text-xs mb-1 ${item.accent === "amber" ? "text-amber-500" : item.accent === "red" ? "text-red-400" : "text-slate-500"}`}>{item.sublabel}</div>
              <div className="text-sm font-semibold text-slate-100">{item.label}</div>
            </button>
          ))}
        </div>

        {/* TABS */}
        <Tabs value={tab} onValueChange={setTab}>
          <TabsList className="mb-6 grid w-full grid-cols-6 rounded-xl bg-slate-900 border border-slate-800 p-1 h-auto">
            {[["dashboard","Dashboard"],["finder","Lead Finder"],["crm","CRM"],["intake","Intake"],["payments","9x12 + Pay"],["reports","Reports"]].map(([value, label]) => (
              <TabsTrigger key={value} value={value}
                className="rounded-lg text-xs data-[state=active]:bg-slate-800 data-[state=active]:text-slate-100 data-[state=active]:shadow-none text-slate-500 h-8">
                {label}
                {value === "crm" && contacts.length > 0 && <span className="ml-1.5 rounded-full bg-slate-700 px-1.5 text-xs text-slate-400">{contacts.length}</span>}
                {value === "finder" && (db.leadFinderDrafts || []).length > 0 && <span className="ml-1.5 rounded-full bg-amber-500/20 px-1.5 text-xs text-amber-400">{(db.leadFinderDrafts || []).length}</span>}
              </TabsTrigger>
            ))}
          </TabsList>

          {/* DASHBOARD */}
          <TabsContent value="dashboard" className="space-y-6">
            <Card className="rounded-2xl border-slate-800 bg-slate-900/50">
              <CardHeader className="pb-3">
                <CardTitle className="text-sm flex items-center gap-2 text-slate-200"><Target className="h-4 w-4 text-amber-400" />Today's Work Queue</CardTitle>
                <CardDescription className="text-slate-600 text-xs">Highest-leverage touches first. Sorted by priority score.</CardDescription>
              </CardHeader>
              <CardContent className="space-y-2">
                {todayQueue.map(c => (
                  <div key={c.id} className="flex flex-col gap-3 rounded-xl border border-slate-800 bg-slate-950/60 p-4 md:flex-row md:items-center md:justify-between ownly-fade-up">
                    <div>
                      <div className="flex items-center gap-2 flex-wrap">
                        <span className="text-sm font-medium text-slate-200">{c.businessName || c.name}</span>
                        <Badge className={`rounded-lg border text-xs ${priorityLabel(scoreContact(c)).tone}`}>{priorityLabel(scoreContact(c)).label}</Badge>
                        <Badge className="rounded-lg border-slate-700 bg-slate-800 text-slate-400 text-xs">{c.stage}</Badge>
                      </div>
                      <p className="mt-1 text-xs text-slate-500">{c.kind === "business" ? c.industry || "Business lead" : c.occupation || "Individual lead"}</p>
                      <p className="text-xs text-amber-500 mt-0.5">{c.queueReason}</p>
                    </div>
                    <div className="flex gap-2 shrink-0">
                      <Button size="sm" className="rounded-xl bg-amber-500 text-slate-950 hover:bg-amber-400 h-8 text-xs" onClick={() => { setSelectedId(c.id); setTab("crm"); }}>Open</Button>
                      <Button size="sm" variant="outline" className="rounded-xl border-slate-700 bg-slate-900 hover:bg-slate-800 text-slate-300 h-8 text-xs" onClick={() => { setSelectedId(c.id); printReport(c); }}>Report</Button>
                    </div>
                  </div>
                ))}
                {!todayQueue.length && <EmptyState title="Queue is empty" subtitle="Add contacts via intake to start building the pipeline." icon={Target} />}
              </CardContent>
            </Card>

            <Card className="rounded-2xl border-slate-800 bg-slate-900/50">
              <CardHeader className="pb-3">
                <CardTitle className="text-sm flex items-center gap-2 text-slate-200"><Briefcase className="h-4 w-4 text-amber-400" />Pipeline Board</CardTitle>
              </CardHeader>
              <CardContent>
                <PipelineBoard contacts={contacts} onOpen={id => { setSelectedId(id); setTab("crm"); }} />
              </CardContent>
            </Card>

            <div className="grid gap-6 lg:grid-cols-2">
              <Card className="rounded-2xl border-slate-800 bg-slate-900/50">
                <CardHeader className="pb-3">
                  <CardTitle className="text-sm flex items-center gap-2 text-slate-200"><NotebookPen className="h-4 w-4 text-amber-400" />Daily Non-Negotiables</CardTitle>
                </CardHeader>
                <CardContent className="space-y-3">
                  <div className="flex gap-2">
                    <Input value={newTask} onChange={e => setNewTask(e.target.value)} onKeyDown={e => e.key === "Enter" && addTask()} placeholder="Add today's task…" className="border-slate-700 bg-slate-950 text-slate-200 placeholder:text-slate-600 h-9" />
                    <Button onClick={addTask} className="rounded-xl bg-amber-500 text-slate-950 hover:bg-amber-400 h-9 w-9 p-0"><Plus className="h-4 w-4" /></Button>
                  </div>
                  <div className="space-y-2">
                    {db.tasks.map(task => (
                      <div key={task.id} className="flex items-center gap-3 rounded-xl border border-slate-800 bg-slate-950/60 p-3">
                        <Checkbox checked={task.done} onCheckedChange={checked => setDb(prev => ({ ...prev, tasks: prev.tasks.map(t => t.id === task.id ? { ...t, done: Boolean(checked) } : t) }))} />
                        <div className="flex-1 min-w-0">
                          <span className={`text-sm ${task.done ? "text-slate-600 line-through" : "text-slate-200"}`}>{task.text}</span>
                          {task.dueDate && <div className="text-xs text-slate-600 ownly-mono mt-0.5">Due {task.dueDate}{task.linkedStage ? ` • ${task.linkedStage}` : ""}</div>}
                        </div>
                        <div className="flex items-center gap-1.5 shrink-0">
                          {contacts.find(c => c.id === task.linkedContactId) && (
                            <Button size="sm" variant="outline" className="rounded-lg border-slate-700 bg-slate-900 h-6 text-xs px-2" onClick={() => { setSelectedId(task.linkedContactId); setTab("crm"); }}>Open</Button>
                          )}
                          <Button variant="ghost" size="icon" className="h-7 w-7" onClick={() => setDb(prev => ({ ...prev, tasks: prev.tasks.filter(t => t.id !== task.id) }))}><Trash2 className="h-3.5 w-3.5 text-slate-600" /></Button>
                        </div>
                      </div>
                    ))}
                    {!db.tasks.length && <p className="text-xs text-slate-600 py-2">No tasks yet. Add something you must do today.</p>}
                  </div>
                </CardContent>
              </Card>

              <Card className="rounded-2xl border-slate-800 bg-slate-900/50">
                <CardHeader className="pb-3">
                  <CardTitle className="text-sm flex items-center gap-2 text-slate-200"><Sparkles className="h-4 w-4 text-amber-400" />Suggested Daily Rhythm</CardTitle>
                </CardHeader>
                <CardContent className="space-y-2">
                  <TimelineRow time="8–10:30" text="Prospecting and first-touch calls" />
                  <TimelineRow time="10:30–12" text="Send reports and book meetings" />
                  <TimelineRow time="1–3" text="Zoom calls and qualification" />
                  <TimelineRow time="3–5" text="Follow-ups and proposal pushes" />
                  <TimelineRow time="5–6" text="Update CRM, set tomorrow's queue" />
                </CardContent>
              </Card>
            </div>

            <RevenueTracker contacts={contacts} onUpdate={updateContact} />
            <AnalyticsPanel contacts={contacts} />

            <Card className="rounded-2xl border-slate-800 bg-slate-900/50">
              <CardHeader className="pb-3">
                <CardTitle className="text-sm flex items-center gap-2 text-slate-200"><Settings className="h-4 w-4 text-amber-400" />Stage Automation Rules</CardTitle>
                <CardDescription className="text-slate-600 text-xs">Customize follow-up timing, note prompts, and cadence hints per stage.</CardDescription>
              </CardHeader>
              <CardContent className="space-y-4">
                <div className="flex flex-wrap gap-2">
                  <Button type="button" size="sm" onClick={() => setAutomationTarget("business")}
                    className={`rounded-xl h-8 text-xs ${automationTarget === "business" ? "bg-amber-500 text-slate-950 hover:bg-amber-400" : "border-slate-700 bg-slate-900 text-slate-400 hover:bg-slate-800 border"}`}>Business</Button>
                  <Button type="button" size="sm" onClick={() => setAutomationTarget("individual")}
                    className={`rounded-xl h-8 text-xs ${automationTarget === "individual" ? "bg-amber-500 text-slate-950 hover:bg-amber-400" : "border-slate-700 bg-slate-900 text-slate-400 hover:bg-slate-800 border"}`}>Individual</Button>
                  <Button type="button" size="sm" onClick={() => setDb(prev => ({ ...prev, weekendAwareFollowUps: !weekendAware }))}
                    className={`rounded-xl h-8 text-xs ${weekendAware ? "bg-emerald-600 text-white hover:bg-emerald-500" : "border-slate-700 bg-slate-900 text-slate-400 hover:bg-slate-800 border"}`}>
                    {weekendAware ? "Weekend-Aware: On" : "Weekend-Aware: Off"}
                  </Button>
                </div>
                <div className="grid gap-3 xl:grid-cols-2">
                  {stages.map(stage => {
                    const rule = (stageRules[automationTarget] || {})[stage] || { followUpDays: 1, notePrompt: "", cadenceHint: "", taskTemplate: "" };
                    return (
                      <div key={stage} className="rounded-xl border border-slate-800 bg-slate-950/60 p-4 space-y-2">
                        <div className="text-sm font-semibold text-slate-200">{stage}</div>
                        <Input value={String(rule.followUpDays ?? "")} onChange={e => updateStageRule(automationTarget, stage, { followUpDays: Number(e.target.value || 0) })} placeholder="Follow-up days" className="border-slate-700 bg-slate-900 text-slate-200 placeholder:text-slate-600 h-8 text-xs" />
                        <Textarea value={rule.notePrompt || ""} onChange={e => updateStageRule(automationTarget, stage, { notePrompt: e.target.value })} placeholder="Note prompt" className="border-slate-700 bg-slate-900 text-slate-200 placeholder:text-slate-600 text-xs min-h-12" />
                        <Textarea value={rule.cadenceHint || ""} onChange={e => updateStageRule(automationTarget, stage, { cadenceHint: e.target.value })} placeholder="Cadence hint" className="border-slate-700 bg-slate-900 text-slate-200 placeholder:text-slate-600 text-xs min-h-12" />
                        <Input value={rule.taskTemplate || ""} onChange={e => updateStageRule(automationTarget, stage, { taskTemplate: e.target.value })} placeholder="Task template (use {name_or_business})" className="border-slate-700 bg-slate-900 text-slate-200 placeholder:text-slate-600 h-8 text-xs" />
                      </div>
                    );
                  })}
                </div>
              </CardContent>
            </Card>
          </TabsContent>

          {/* LEAD FINDER */}
          <TabsContent value="finder">
            <LeadFinderGrader
              savedQueue={db.leadFinderDrafts || []}
              existingContacts={contacts}
              onSaveQueue={queue => setDb(prev => ({ ...prev, leadFinderDrafts: queue }))}
              onMergeIntoCrm={(id, merged) => { updateContact(id, merged); toast("Merged into existing CRM record"); }}
              onCreateLead={lead => {
                const contact = { ...lead, id: uid(), stage: "New Lead", createdAt: new Date().toISOString(), notes: [{ id: uid(), text: "Lead created from Lead Finder.", at: new Date().toISOString() }], reportCount: 0, recommendations: matchServices(lead), graderSummary: lead.graderSummary, bestApproach: lead.bestApproach, likelyObjection: lead.likelyObjection, firstOffer: lead.firstOffer };
                setDb(prev => ({ ...prev, contacts: [contact, ...prev.contacts] }));
                setSelectedId(contact.id); setTab("crm"); toast("Lead added to CRM");
              }}
              onToast={toast}
            />
          </TabsContent>

          {/* CRM */}
          <TabsContent value="crm">
            <div className="grid gap-6 lg:grid-cols-[.9fr_1.1fr]">
              <Card className="rounded-2xl border-slate-800 bg-slate-900/50">
                <CardHeader className="pb-3">
                  <CardTitle className="text-sm flex items-center gap-2 text-slate-200"><Search className="h-4 w-4 text-amber-400" />Contacts</CardTitle>
                </CardHeader>
                <CardContent className="space-y-3">
                  <div className="grid gap-2">
                    <div className="relative">
                      <Search className="absolute left-3 top-2.5 h-3.5 w-3.5 text-slate-600" />
                      <Input value={crmSearch} onChange={e => setCrmSearch(e.target.value)} placeholder="Search name, business, email, city…" className="pl-8 border-slate-700 bg-slate-950 text-slate-200 placeholder:text-slate-600 h-9" />
                    </div>
                    <Select value={crmFilter} onValueChange={setCrmFilter}>
                      <SelectTrigger className="border-slate-700 bg-slate-950 text-slate-200 h-9"><SelectValue /></SelectTrigger>
                      <SelectContent><SelectItem value="all">All stages</SelectItem>{stages.map(s => <SelectItem key={s} value={s}>{s}</SelectItem>)}</SelectContent>
                    </Select>
                  </div>
                  <div className="flex justify-between text-xs text-slate-600">
                    <span>{filteredContacts.length} showing</span><span>{contacts.length} total</span>
                  </div>
                  <div className="space-y-2 max-h-[600px] overflow-y-auto pr-1">
                    {filteredContacts.map(c => (
                      <button key={c.id} onClick={() => setSelectedId(c.id)}
                        className={`w-full rounded-xl border p-3.5 text-left transition-all ${selectedId === c.id ? "border-amber-500/30 bg-amber-500/8" : "border-slate-800 bg-slate-950/60 hover:border-slate-700 hover:bg-slate-950"}`}>
                        <div className="flex items-start justify-between gap-2">
                          <div className="min-w-0">
                            <div className="text-sm font-medium text-slate-200 truncate">{c.businessName || c.name}</div>
                            <div className="text-xs text-slate-500 mt-0.5 truncate">{c.kind === "business" ? c.industry || "Business" : c.occupation || "Individual"}</div>
                          </div>
                          <Badge className={`rounded-lg border text-xs shrink-0 ${priorityLabel(scoreContact(c)).tone}`}>{priorityLabel(scoreContact(c)).label}</Badge>
                        </div>
                        <div className="mt-2 flex flex-wrap gap-1.5">
                          <span className="rounded-md bg-slate-800 border border-slate-700 px-1.5 py-0.5 text-xs text-slate-500">{c.stage}</span>
                          {c.nextFollowUp && <span className="rounded-md bg-slate-800 border border-slate-700 px-1.5 py-0.5 text-xs text-slate-600 ownly-mono">{c.nextFollowUp}</span>}
                        </div>
                      </button>
                    ))}
                    {!filteredContacts.length && <EmptyState title="No matching contacts" subtitle="Adjust search or add contacts via intake." icon={UserRound} />}
                  </div>
                </CardContent>
              </Card>

              <Card className="rounded-2xl border-slate-800 bg-slate-900/50">
                <CardHeader className="pb-3">
                  <CardTitle className="text-sm flex items-center gap-2 text-slate-200"><Briefcase className="h-4 w-4 text-amber-400" />Contact Detail</CardTitle>
                </CardHeader>
                <CardContent className="max-h-[800px] overflow-y-auto pr-1">
                  {selected ? (
                    <ContactDetail
                      contact={selected}
                      stageRules={stageRules}
                      weekendAwareFollowUps={weekendAware}
                      onUpdate={updateContact}
                      onStageChange={changeStage}
                      onAddNote={addNote}
                      onDelete={deleteContact}
                      onReport={printReport}
                      onOpenEmail={(c, template) => window.open(gmailLink(c, template), "_blank")}
                      onToast={toast}
                    />
                  ) : (
                    <EmptyState title="Select a contact" subtitle="Pick a record from the list to view details." icon={Building2} />
                  )}
                </CardContent>
              </Card>
            </div>
          </TabsContent>

          {/* INTAKE */}
          <TabsContent value="intake">
            <div className="grid gap-6 lg:grid-cols-2">
              <Card className="rounded-2xl border-slate-800 bg-slate-900/50">
                <CardHeader className="pb-3">
                  <CardTitle className="text-sm flex items-center gap-2 text-slate-200"><Building2 className="h-4 w-4 text-amber-400" />Business Intake</CardTitle>
                  <CardDescription className="text-slate-600 text-xs">Capture business leads with full goal context.</CardDescription>
                </CardHeader>
                <CardContent className="space-y-3">
                  <div className="grid gap-2 md:grid-cols-2">
                    {[["businessName","Business name"],["name","Contact name"],["title","Title"],["industry","Industry"],["email","Email"],["phone","Phone"],["website","Website"],["employeeCount","Employees"],["city","City"],["state","State"],["revenue","Revenue"]].map(([key, ph]) => (
                      <Input key={key} placeholder={ph} value={businessForm[key]} onChange={e => setBusinessForm({ ...businessForm, [key]: e.target.value })} className="border-slate-700 bg-slate-950 text-slate-200 placeholder:text-slate-600 h-9" />
                    ))}
                    <Input type="date" value={businessForm.nextFollowUp} onChange={e => setBusinessForm({ ...businessForm, nextFollowUp: e.target.value })} className="border-slate-700 bg-slate-950 text-slate-200 h-9" />
                  </div>
                  <Input placeholder="Lead source" value={businessForm.source} onChange={e => setBusinessForm({ ...businessForm, source: e.target.value })} className="border-slate-700 bg-slate-950 text-slate-200 placeholder:text-slate-600 h-9" />
                  <GoalPicker selected={businessForm.goals} options={businessGoals} onToggle={key => setBusinessForm({ ...businessForm, goals: businessForm.goals.includes(key) ? businessForm.goals.filter(g => g !== key) : [...businessForm.goals, key] })} />
                  <Button className="w-full rounded-xl bg-amber-500 text-slate-950 hover:bg-amber-400 h-10" onClick={() => { addContact(businessForm); setBusinessForm(emptyBusiness); }}>
                    Save Business to CRM
                  </Button>
                </CardContent>
              </Card>

              <Card className="rounded-2xl border-slate-800 bg-slate-900/50">
                <CardHeader className="pb-3">
                  <CardTitle className="text-sm flex items-center gap-2 text-slate-200"><UserRound className="h-4 w-4 text-amber-400" />Individual Intake</CardTitle>
                  <CardDescription className="text-slate-600 text-xs">For employees, self-employed, investors, and personal clients.</CardDescription>
                </CardHeader>
                <CardContent className="space-y-3">
                  <div className="grid gap-2 md:grid-cols-2">
                    {[["name","Full name"],["occupation","Occupation"],["email","Email"],["phone","Phone"],["city","City"],["state","State"],["income","Income range"]].map(([key, ph]) => (
                      <Input key={key} placeholder={ph} value={individualForm[key]} onChange={e => setIndividualForm({ ...individualForm, [key]: e.target.value })} className="border-slate-700 bg-slate-950 text-slate-200 placeholder:text-slate-600 h-9" />
                    ))}
                    <Input type="date" value={individualForm.nextFollowUp} onChange={e => setIndividualForm({ ...individualForm, nextFollowUp: e.target.value })} className="border-slate-700 bg-slate-950 text-slate-200 h-9" />
                  </div>
                  <Input placeholder="Lead source" value={individualForm.source} onChange={e => setIndividualForm({ ...individualForm, source: e.target.value })} className="border-slate-700 bg-slate-950 text-slate-200 placeholder:text-slate-600 h-9" />
                  <GoalPicker selected={individualForm.goals} options={individualGoals} onToggle={key => setIndividualForm({ ...individualForm, goals: individualForm.goals.includes(key) ? individualForm.goals.filter(g => g !== key) : [...individualForm.goals, key] })} />
                  <Button className="w-full rounded-xl bg-amber-500 text-slate-950 hover:bg-amber-400 h-10" onClick={() => { addContact(individualForm); setIndividualForm(emptyIndividual); }}>
                    Save Individual to CRM
                  </Button>
                </CardContent>
              </Card>
            </div>
          </TabsContent>

          {/* PAYMENTS */}
          <TabsContent value="payments">
            <div className="grid gap-6 lg:grid-cols-2">
              <Card className="rounded-2xl border-slate-800 bg-slate-900/50">
                <CardHeader className="pb-3">
                  <CardTitle className="text-sm flex items-center gap-2 text-slate-200"><CreditCard className="h-4 w-4 text-amber-400" />9x12 Payment Links</CardTitle>
                  <CardDescription className="text-slate-600 text-xs">Rename links inline. Changes auto-save.</CardDescription>
                </CardHeader>
                <CardContent className="space-y-3">
                  {paymentLinks.map((link, i) => (
                    <div key={link} className="rounded-xl border border-slate-800 bg-slate-950/60 p-4 space-y-2">
                      <div className="grid gap-2 md:grid-cols-[1fr_auto_auto]">
                        <Input value={db.paymentLabels?.[i] || `Payment Link ${i + 1}`} onChange={e => setDb(prev => ({ ...prev, paymentLabels: prev.paymentLabels.map((l, idx) => idx === i ? e.target.value : l) }))} className="border-slate-700 bg-slate-900 text-slate-200 h-9" />
                        <Button size="sm" variant="outline" className="rounded-xl border-slate-700 bg-slate-900 hover:bg-slate-800 h-9 text-xs gap-1.5" onClick={() => { navigator.clipboard.writeText(link); toast("Link copied"); }}>
                          <Copy className="h-3.5 w-3.5" />Copy
                        </Button>
                        <a href={link} target="_blank">
                          <Button size="sm" className="rounded-xl bg-amber-500 text-slate-950 hover:bg-amber-400 h-9 text-xs gap-1.5">
                            <ExternalLink className="h-3.5 w-3.5" />Open
                          </Button>
                        </a>
                      </div>
                      <p className="text-xs text-slate-700 ownly-mono truncate">{link}</p>
                    </div>
                  ))}
                </CardContent>
              </Card>

              <Card className="rounded-2xl border-slate-800 bg-slate-900/50">
                <CardHeader className="pb-3">
                  <CardTitle className="text-sm flex items-center gap-2 text-slate-200"><Phone className="h-4 w-4 text-amber-400" />9x12 Talking Points</CardTitle>
                </CardHeader>
                <CardContent className="space-y-3">
                  <TalkingPoint title="Core opener" body="I'm putting together a local oversized postcard campaign going to thousands of homes in your area. A few non-competing businesses share the cost, and I only allow one business per category." />
                  <TalkingPoint title="Qualify" body="Before I send anything, which area are you most interested in targeting right now?" />
                  <TalkingPoint title="Why it works" body="This is fixed-cost local visibility that stays in the home longer than a disappearing online ad." />
                  <TalkingPoint title="Best categories" body="Home services, legal, financial, insurance, dental, med spa, real estate, and restaurants." />
                </CardContent>
              </Card>

              <CampaignTracker contacts={contacts} />
            </div>
          </TabsContent>

          {/* REPORTS */}
          <TabsContent value="reports">
            <Card className="rounded-2xl border-slate-800 bg-slate-900/50">
              <CardHeader className="pb-3">
                <CardTitle className="text-sm flex items-center gap-2 text-slate-200"><FileText className="h-4 w-4 text-amber-400" />Report Center</CardTitle>
                <CardDescription className="text-slate-600 text-xs">Select a contact in CRM, then build and print their report.</CardDescription>
              </CardHeader>
              <CardContent>
                {selected ? (
                  <div className="grid gap-6 lg:grid-cols-[1fr_.9fr]">
                    <div className="space-y-4">
                      <div className="rounded-xl border border-slate-800 bg-slate-950/60 p-5">
                        <h3 className="text-xl font-semibold text-slate-100">{selected.businessName || selected.name}</h3>
                        <p className="mt-1 text-sm text-slate-500">{selected.kind === "business" ? selected.industry || "Business" : selected.occupation || "Individual"}</p>
                        <div className="mt-4 grid gap-3 md:grid-cols-2">
                          <Stat label="Readiness Score" value={`${scoreContact(selected)}/100`} icon={AlertCircle} />
                          <Stat label="Recommended Services" value={matchServices(selected).length} icon={Sparkles} />
                          <Stat label="Notes Logged" value={(selected.notes || []).length} icon={NotebookPen} />
                          <Stat label="Reports Sent" value={selected.reportCount || 0} icon={FileText} />
                        </div>
                      </div>
                      <div className="rounded-xl border border-slate-800 bg-slate-950/60 p-5">
                        <h4 className="text-sm font-semibold text-slate-200 mb-3">What's in the report</h4>
                        <ul className="space-y-1.5 text-xs text-slate-400">
                          {["Branded cover page","Client snapshot","Opportunity scorecard","Recommended service stack","Next-step action plan","Direct CTA to DaveIvery.com"].map(item => (
                            <li key={item} className="flex items-center gap-2"><CheckCircle2 className="h-3 w-3 text-amber-500 shrink-0" />{item}</li>
                          ))}
                        </ul>
                        <Button className="mt-4 w-full rounded-xl bg-amber-500 text-slate-950 hover:bg-amber-400 h-10" onClick={() => printReport(selected)}>
                          Open Printable Report
                        </Button>
                      </div>
                    </div>
                    <div className="space-y-4">
                      <ProposalBuilder contact={selected} paymentLabels={db.paymentLabels || []} />
                      <AgreementGenerator contact={selected} paymentLabels={db.paymentLabels || []} onUpdate={updateContact} />
                      <CadenceGenerator contact={selected} onUpdate={updateContact} onOpenEmail={(c, t) => window.open(gmailLink(c, t), "_blank")} />
                      <ScriptBuilder contact={selected} />
                    </div>
                  </div>
                ) : (
                  <EmptyState title="No contact selected" subtitle="Go to CRM, select a contact, then come back here." icon={FileText} />
                )}
              </CardContent>
            </Card>
          </TabsContent>
        </Tabs>
      </div>

      {/* REPORT DIALOG */}
      <Dialog open={reportOpen} onOpenChange={setReportOpen}>
        <DialogContent className="max-w-4xl border-slate-800 bg-slate-950 text-slate-100 max-h-[90vh] overflow-y-auto">
          <DialogHeader>
            <DialogTitle className="text-slate-100">Printable Report</DialogTitle>
            <DialogDescription className="text-slate-500">Use your browser's print dialog to save as PDF.</DialogDescription>
          </DialogHeader>
          {selected && <ReportView contact={selected} />}
          <div className="flex justify-end gap-2 print:hidden pt-2">
            <Button variant="outline" className="rounded-xl border-slate-700 bg-slate-900 hover:bg-slate-800 text-slate-300" onClick={() => setReportOpen(false)}>Close</Button>
            <Button className="rounded-xl bg-amber-500 text-slate-950 hover:bg-amber-400" onClick={() => window.print()}>Print / Save PDF</Button>
          </div>
        </DialogContent>
      </Dialog>

      <ToastContainer toasts={toasts} />
    </div>
  );
}

try {
  const __root = ReactDOM.createRoot(document.getElementById("root"));
  __root.render(React.createElement(App));
} catch(e) {
  document.getElementById("root").innerHTML = '<div style="padding:40px;font-family:monospace;color:#ef4444;font-size:13px"><strong>CRM Error:</strong><br><br>' + e.toString() + '</div>';
}

</script>
</body>
</html>
